services:
  - type: web
    name: ruxi
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: LLM_PROVIDER
        value: doubao
      - key: LLM_API_BASE
        value: https://ark.cn-beijing.volces.com/api/v3
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: doubao-seed-2-0-lite-260428
      - key: LLM_TIMEOUT_SECONDS
        value: "40"
      - key: DEV_MODE_PASSWORD
        sync: false
      - key: INVITE_CODE
        sync: false
      - key: RATE_LIMIT_PER_MINUTE
        value: "120"
      - key: LOG_LEVEL
        value: INFO
      - key: SESSION_TTL_MINUTES
        value: "30"
      - key: SESSION_MAX_CONCURRENT
        value: "200"
      - key: SESSION_HARD_MAX_TURNS
        value: "50"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: CONTENT_BACKEND
        value: supabase
