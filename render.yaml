services:
  - type: web
    name: ruxi
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: doubao
      - key: LLM_API_BASE
        value: https://ark.cn-beijing.volces.com/api/v3
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: doubao-seed-2-0-lite-260428
