name: Keep Render Alive

on:
  schedule:
    - cron: '*/14 * * * *'   # 每14分钟跑一次，赶在15分钟休眠阈值之前
  workflow_dispatch:          # 允许你在GitHub网页上手动触发测试

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Ruxi
        run: curl -sS -o /dev/null -w "HTTP %{http_code}\n" https://ruxi.onrender.com/
