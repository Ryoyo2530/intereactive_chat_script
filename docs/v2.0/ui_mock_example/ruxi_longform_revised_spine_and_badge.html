<h2 class="sr-only">修订版：更含蓄的结局标签，以及更具水墨潮汐笔触感的剧情脉络线</h2>
<div style="background:var(--surface-1);border-radius:12px;border:0.5px solid var(--border);padding:20px;">
<div style="background:#F5F2EB;border-radius:8px;padding:26px 24px;font-family:Georgia,'Noto Serif SC',serif;color:#232323;max-width:520px;margin:0 auto;">

  <div style="text-align:center;margin-bottom:18px;">
    <div style="font-size:11px;letter-spacing:0.1em;color:#A6A196;">向海的信</div>
    <div style="font-size:16px;margin-top:4px;">第三章 · 潮声未歇</div>
  </div>

  <svg viewBox="0 0 480 90" style="width:100%;height:82px;display:block;margin-bottom:20px;">
    <defs>
      <linearGradient id="mainFade" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#4B6355" stop-opacity="1"/>
        <stop offset="55%" stop-color="#4B6355" stop-opacity="1"/>
        <stop offset="100%" stop-color="#4B6355" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="tribFade" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#B0AA9C" stop-opacity="0.55"/>
        <stop offset="100%" stop-color="#B0AA9C" stop-opacity="0"/>
      </linearGradient>
    </defs>

    <path d="M 20 55 C 80 30, 130 65, 190 45 C 240 30, 270 50, 300 35 C 340 18, 380 25, 440 12"
          fill="none" stroke="url(#mainFade)" stroke-width="1.3" stroke-linecap="round"/>

    <path d="M 190 45 C 205 65, 225 78, 250 82"
          fill="none" stroke="url(#tribFade)" stroke-width="1" stroke-linecap="round"/>

    <circle cx="20" cy="55" r="3" fill="#4B6355"/>
    <circle cx="130" cy="65" r="3" fill="#4B6355"/>
    <circle cx="190" cy="45" r="3" fill="#4B6355"/>
    <circle cx="300" cy="35" r="5.5" fill="#F5F2EB" stroke="#4B6355" stroke-width="2"/>

    <text x="20" y="70" font-size="8" fill="#A6A196" text-anchor="middle">起</text>
    <text x="300" y="26" font-size="8" fill="#4B6355" text-anchor="middle">此刻</text>
  </svg>

  <div style="display:flex;flex-direction:column;gap:9px;margin-bottom:20px;padding-bottom:18px;border-bottom:0.5px solid #DDD8CF;">
    <div>
      <div style="display:flex;justify-content:space-between;font-size:10.5px;color:#A6A196;margin-bottom:3px;"><span>信任</span><span>62</span></div>
      <div style="height:3px;border-radius:2px;background:#E7E3D9;"><div style="width:62%;height:100%;border-radius:2px;background:#4B6355;"></div></div>
    </div>
    <div>
      <div style="display:flex;justify-content:space-between;font-size:10.5px;color:#A6A196;margin-bottom:3px;"><span>疏离</span><span>78</span></div>
      <div style="height:3px;border-radius:2px;background:#E7E3D9;"><div style="width:78%;height:100%;border-radius:2px;background:#8A4D4A;"></div></div>
    </div>
  </div>

  <div style="font-size:14.5px;line-height:1.9;letter-spacing:0.03em;margin-bottom:22px;">
    海风把信纸吹得微微卷边。你还没决定，要不要在潮水彻底盖过脚印之前，把这句话说出口。
  </div>

  <div style="display:flex;justify-content:space-between;align-items:center;">
    <span style="font-size:10.5px;color:#A6A196;display:flex;align-items:center;gap:5px;">
      <i class="ti ti-moon" aria-hidden="true" style="font-size:12px;"></i>
      仍有未至之地
    </span>
    <span style="font-size:12.5px;padding:8px 20px;border-radius:8px;background:#4B6355;color:#EAF0EA;">继续</span>
  </div>

</div>
</div>
